project_name: bookgpt
stage_name: train_2048

model:
  base_model_name: models/Qwen2.5-32B-Instruct-bnb-4bit
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

dataset:
  train_path: dataset/final_runs/current/train.jsonl
  eval_path: dataset/final_runs/current/dev.jsonl
  text_field: text

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth

trainer:
  output_dir: outputs/train_2048
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  max_steps: 320
  do_eval: true
  learning_rate: 0.00002
  warmup_steps: 20
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 40
  save_steps: 80
  save_total_limit: 3
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 0.3
  report_to: none
